name: Deploy to Test

on:
  push:
    branches:
      - test

permissions:
  id-token: write   # Required for OIDC login to Azure
  contents: read

jobs:
  deploy:
    name: Deploy Test Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Login to Azure via OIDC (no client secret — no rotation needed)
      # -----------------------------------------------------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------------
      # 2. Deploy infrastructure via Bicep
      #    Creates resource group, SQL Server + DB, and Static Web App
      # -----------------------------------------------------------------------
      - name: Deploy Infrastructure (Bicep)
        id: infra
        env:
          SQL_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD_TEST }}
        run: |
          result=$(az deployment sub create \
            --name "deploy-test-${{ github.run_id }}" \
            --location australiaeast \
            --template-file infra/main.bicep \
            --parameters @infra/environments/test.parameters.json \
            --parameters sqlAdminPassword="$SQL_PASSWORD" \
            --query "properties.outputs" \
            --output json)

          SWA_TOKEN=$(echo "$result" | jq -r '.swaDeploymentToken.value')
          SQL_FQDN=$(echo "$result"  | jq -r '.sqlServerFqdn.value')
          SQL_DB=$(echo "$result"    | jq -r '.sqlDbName.value')

          # Mask the deployment token so it never appears in logs
          echo "::add-mask::$SWA_TOKEN"

          echo "swaToken=$SWA_TOKEN" >> "$GITHUB_OUTPUT"
          echo "sqlFqdn=$SQL_FQDN"   >> "$GITHUB_OUTPUT"
          echo "sqlDb=$SQL_DB"       >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Run SQL migrations
      #    azure/sql-action automatically adds/removes a firewall rule for the
      #    GitHub Actions runner IP, so no manual firewall management needed.
      # -----------------------------------------------------------------------
      - name: Run SQL Migrations
        uses: azure/sql-action@v2.3
        with:
          connection-string: >-
            Server=tcp:${{ steps.infra.outputs.sqlFqdn }},1433;
            Database=${{ steps.infra.outputs.sqlDb }};
            User Id=sqladmin;
            Password=${{ secrets.SQL_ADMIN_PASSWORD_TEST }};
            Encrypt=True;TrustServerCertificate=False;
          path: ./infra/sql/migrations/*.sql

      # -----------------------------------------------------------------------
      # 4. Deploy frontend + managed API functions in a single action
      #    The SWA action (via Oryx) builds both the React app and the
      #    TypeScript Functions automatically.
      # -----------------------------------------------------------------------
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.infra.outputs.swaToken }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          api_location: api
